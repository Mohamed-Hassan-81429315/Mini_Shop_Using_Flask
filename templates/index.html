<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MiniShop - Home</title>

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:#333;
            color:white;
            padding:15px;
            text-align:center;
        }

        nav{
            background:#555;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
            font-weight:bold;
        }

        nav a:hover{
            color:yellow;
        }

        .container{
            width:80%;
            margin:auto;
            padding:20px;
        }

        .products{
            display:flex;
            gap:20px;
        }

        .card{
            background:white;
            padding:15px;
            border-radius:8px;
            width:30%;
            text-align:center;
            box-shadow:0px 0px 5px gray;
        }

        button{
            background:#333;
            color:white;
            border:none;
            padding:10px 15px;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#111;
        }

        footer{
            margin-top:40px;
            background:#333;
            color:white;
            text-align:center;
            padding:10px;
        }
    </style>
</head>

<body>

<header>
    <h1>MiniShop</h1>
    <p>Welcome to our Online Store</p>
</header>

<nav>
    <a href="/">Home</a>
    <a href="{{ url_for('products') }}">Products</a>
<a href="{{ url_for('login') }}">Login</a></nav>

<div class="container">

    <h2>Featured Products</h2>

    <div class="products">

        <div class="card">
            <h3>Python Book</h3>
            <p>Learn Python programming easily.</p>
            <p><b>$20</b></p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <h3>Keyboard</h3>
            <p>Mechanical keyboard for developers.</p>
            <p><b>$45</b></p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <h3>Wireless Mouse</h3>
            <p>Fast and smooth wireless mouse.</p>
            <p><b>$25</b></p>
            <button>Add to Cart</button>
        </div>

    </div>

</div>

<footer>
    <p> Done By : Mohamed Hassan</p>
    <p>MiniShop © 2026</p>
</footer>

</body>
</html>
